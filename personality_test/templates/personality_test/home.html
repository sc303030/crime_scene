{% extends 'personality_test/base.html' %}

{% block title %}크라임씬 성격 테스트 - 홈{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center">
        <h1 class="mb-4">🔍 크라임씬 성격 테스트</h1>
        <p class="lead mb-4">
            당신은 크라임씬에 나오는 어떤 인물과 가장 비슷한 성격을 가지고 있을까요?
        </p>
        <div class="mb-4">
            <p class="text-muted">
                📝 몇 가지 질문에 답하면 당신의 성격 유형을 분석해드립니다.<br>
                ⏱️ 소요 시간: 약 2-3분<br>
                🎯 정확도: 크라임씬 전문가 수준!
            </p>
        </div>
        <a href="{% url 'personality_test:test' %}" class="btn btn-primary btn-lg">
            테스트 시작하기 →
        </a>
    </div>
</div>
{% endblock %}
